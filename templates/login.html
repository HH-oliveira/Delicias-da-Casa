<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Delícias da Casa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="card">
        <div class="logo-wrapper">
    <img class="logo" src="adrian.jpeg" alt="Delícias da Casa">
</div>

        <h1>login para Delícias da Casa</h1>

        {% with mensagens = get_flashed_messages() %}
            {% if mensagens %}
                {% for m in mensagens %}
                    <div class="erro">{{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="campo">
                <input type="text" id="login" name="login" placeholder="email ou usuário" required autofocus>
            </div>

            <div class="campo">
                <input type="password" id="senha" name="senha" placeholder="senha" required>
                <button type="button" class="toggle-senha" onclick="alternarSenha()" aria-label="Mostrar ou esconder senha">
                    <svg id="icone-olho" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <button type="submit">Log in</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
